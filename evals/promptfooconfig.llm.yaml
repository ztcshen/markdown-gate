description: markdown-gate optional LLM final-state hygiene judge

prompts:
  - "{{document}}"

providers:
  - openai:gpt-5-mini

tests:
  - description: public API docs should read as final-state contract
    vars:
      doc_type: public-api-doc
      document: |
        # Withdraw Apply API

        The request uses `apply_no` and `amount`.
    assert:
      - type: llm-rubric
        threshold: 0.9
        value: file://rubrics/final-state.md

  - description: public API docs should fail when authoring history leaks
    vars:
      doc_type: public-api-doc
      document: |
        # Withdraw Apply API

        The previous design used `old_field`, but it has been removed.
    assert:
      - type: llm-rubric
        threshold: 0.9
        value: |
          Fail this document if it reads like publishable final-state API documentation.
          Pass this assertion only when you detect drafting history, rejected prior
          design context, or revision residue that should not be in public API docs.
